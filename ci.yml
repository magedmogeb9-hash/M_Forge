name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Syntax check all JS files
        run: |
          find . -name "*.js" -not -path "./node_modules/*" -print0 | xargs -0 -n1 node --check

      - name: Verify environment setup (with dummy values)
        run: npm run verify
        env:
          JWT_SECRET: ci_dummy_jwt_secret_not_for_production_use_only
          ENCRYPTION_KEY: ci_dummy_encryption_key_32_chars_min
          MONGO_URI_CORE: mongodb://localhost:27017/ci_core
          MONGO_URI_ECOMMERCE: mongodb://localhost:27017/ci_ecommerce
          MONGO_URI_SOCIAL: mongodb://localhost:27017/ci_social
          MONGO_URI_ADS: mongodb://localhost:27017/ci_ads
          MONGO_URI_BANKING: mongodb://localhost:27017/ci_banking
